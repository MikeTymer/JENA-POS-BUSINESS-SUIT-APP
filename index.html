    <script>
      // Prevent libraries from trying to overwrite window.fetch
      // This fixes "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        if (window.fetch) {
          const originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: false,
              configurable: false
            });
          } catch (e) {
            // If it's already a getter-only property, this might fail, 
            // but that's what we want (it's already protected).
          }
        }
      })();
    </script>
